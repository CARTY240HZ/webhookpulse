[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173

# API routes → Netlify Functions (evaluated FIRST)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback → index.html for all client routes (evaluated LAST)
# force = true ensures this always triggers even if a static file exists
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
